apiVersion: v1
kind: Service
metadata:
  name: finch-postgres
  namespace: finch
spec:
  clusterIP: None
  selector:
    app: finch-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: finch-postgres
  namespace: finch
spec:
  serviceName: finch-postgres
  replicas: 1
  selector:
    matchLabels:
      app: finch-postgres
  template:
    metadata:
      labels:
        app: finch-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: finch
            - name: POSTGRES_USER
              value: finch
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finch-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "finch", "-d", "finch"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "finch", "-d", "finch"]
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
