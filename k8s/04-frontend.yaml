apiVersion: apps/v1
kind: Deployment
metadata:
  name: finch-frontend
  namespace: finch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finch-frontend
  template:
    metadata:
      labels:
        app: finch-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/m-ryan-nugent/finch-frontend:v0.1.0
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              value: finch-backend:8000
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 100m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: finch-frontend
  namespace: finch
spec:
  type: NodePort
  selector:
    app: finch-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30180
