# DO NOT commit this file with real values.
#
# Create the secret with kubectl instead:
#
#   kubectl create secret generic finch-secrets -n finch \
#     --from-literal=POSTGRES_PASSWORD='YOUR_PASSWORD_HERE'
#
# This file exists as a reference template only.
apiVersion: v1
kind: Secret
metadata:
  name: finch-secrets
  namespace: finch
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
